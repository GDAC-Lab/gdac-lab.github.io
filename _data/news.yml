# News / お知らせ (shown on EN and JA home pages, newest first).
# Fields per item:
#   date: YYYY-MM-DD (required for display)
#   title, title_en, title_ja: all optional (short items can use body_* only)
#   body, body_en, body_ja: optional (Markdown); at least one of title/body/link should be set
#   link: optional URL (external or on this site)
#   link_label_en, link_label_ja: optional; default "Read more" / 「詳細」
items:
  - date: "2026-03-28"
    body_en: "Added a **News** section on the home page. Edit `_data/news.yml` to post updates—titles are optional for short notices."
    body_ja: "ホームに**お知らせ**欄を追加しました。短い投稿は `body_en` / `body_ja` のみでも問題ありません（タイトルは省略可）。`_data/news.yml` を編集してください。"
